<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigator Digitaler Wandel</title>
<style>
  :root {
    --people: #E6007E;
    --teaching: #E30613;
    --organisation: #95C11F;
    --cooperation: #F5A623;
    --infrastructure: #00B4D5;
    --bg: #f7f8fa;
    --card-bg: #fff;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  /* Header */
  .header { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header-controls { display: flex; gap: 8px; align-items: center; }
  .lang-btn { padding: 4px 12px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
  .lang-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
  .mode-btn { padding: 6px 14px; border: none; border-radius: 8px; background: var(--text); color: #fff; cursor: pointer; font-size: 13px; font-weight: 500; }
  .mode-btn:hover { opacity: 0.9; }
  .back-btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; display: none; }
  .back-btn:hover { background: #f0f0f0; }

  /* Layout */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* Compass View */
  #compass-view { }
  .compass-intro { text-align: center; margin-bottom: 32px; }
  .compass-intro h2 { font-size: 28px; margin-bottom: 8px; }
  .compass-intro p { color: var(--text-light); font-size: 15px; max-width: 600px; margin: 0 auto; }

  .dimensions-grid { display: flex; flex-direction: column; gap: 20px; }
  .dimension-section { }
  .dimension-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-left: 4px; }
  .dimension-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .dimension-name { font-size: 15px; font-weight: 600; }
  .dimension-topics { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }

  .topic-card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; box-shadow: var(--shadow); position: relative; }
  .topic-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .topic-card.visited { opacity: 0.7; }
  .topic-card.visited::after { content: '\2713'; position: absolute; top: 8px; right: 10px; font-size: 14px; color: #27ae60; font-weight: bold; }
  .topic-number { font-size: 11px; font-weight: 700; color: var(--text-light); margin-bottom: 2px; }
  .topic-name { font-size: 13px; font-weight: 500; }
  .topic-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; background: #e8f8f5; color: #1abc9c; margin-top: 4px; font-weight: 600; }

  /* Quick Pulse View */
  #pulse-view { display: none; }
  .pulse-card { background: var(--card-bg); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); max-width: 680px; margin: 0 auto; }
  .pulse-progress { display: flex; gap: 6px; margin-bottom: 24px; }
  .pulse-dot { width: 100%; height: 6px; border-radius: 3px; background: #e8e8e8; }
  .pulse-dot.active { background: var(--text); }
  .pulse-dot.done { background: #27ae60; }
  .pulse-dimension { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .pulse-question { font-size: 20px; font-weight: 500; margin-bottom: 24px; line-height: 1.4; }
  .pulse-textarea { width: 100%; min-height: 100px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; font-size: 15px; font-family: inherit; resize: vertical; }
  .pulse-textarea:focus { outline: none; border-color: var(--text); }
  .pulse-nav { display: flex; justify-content: space-between; margin-top: 20px; }
  .pulse-nav button { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .pulse-skip { background: none; border: 1px solid #ddd; color: var(--text-light); }
  .pulse-next { background: var(--text); border: none; color: #fff; }
  .pulse-next:hover { opacity: 0.9; }

  /* Pulse Result */
  .pulse-result { text-align: center; }
  .pulse-result h3 { font-size: 22px; margin-bottom: 12px; }
  .pulse-result p { color: var(--text-light); margin-bottom: 20px; }
  .pulse-suggestion { display: inline-block; padding: 12px 24px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; color: #fff; }
  .pulse-suggestion:hover { opacity: 0.9; }

  /* Topic Detail View */
  #topic-view { display: none; }
  .topic-detail { max-width: 720px; margin: 0 auto; }
  .topic-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .topic-detail-dim { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .topic-detail-title { font-size: 28px; font-weight: 600; margin-bottom: 16px; }

  .question-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .question-item { background: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .question-text { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  .question-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .question-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #f0f0f0; color: var(--text-light); }
  .question-tag.new { background: #fef9e7; color: #f39c12; }
  .question-textarea { width: 100%; min-height: 60px; border: 1px solid #e8e8e8; border-radius: 6px; padding: 10px; font-size: 14px; font-family: inherit; resize: vertical; margin-top: 10px; }
  .question-textarea:focus { outline: none; border-color: #bbb; }

  /* Connected Topics */
  .connections { margin-top: 16px; }
  .connections h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: var(--text-light); }
  .connection-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .connection-chip { padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: none; color: #fff; font-weight: 500; transition: all 0.15s; }
  .connection-chip:hover { transform: scale(1.05); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }

  /* Barrier Lens View */
  #barrier-view { display: none; }
  .barrier-section { max-width: 720px; margin: 0 auto; }
  .barrier-intro { text-align: center; margin-bottom: 32px; }
  .barrier-level { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 16px; cursor: pointer; transition: all 0.15s; }
  .barrier-level:hover { transform: translateY(-2px); }
  .barrier-level h3 { font-size: 18px; margin-bottom: 6px; }
  .barrier-level p { color: var(--text-light); font-size: 14px; margin-bottom: 8px; }
  .barrier-topics { display: flex; flex-wrap: wrap; gap: 6px; }
  .barrier-topic-chip { font-size: 12px; padding: 3px 10px; border-radius: 12px; background: #f0f0f0; color: var(--text); cursor: pointer; border: none; }
  .barrier-topic-chip:hover { background: #ddd; }

  /* Footer */
  .footer { text-align: center; padding: 32px; color: var(--text-light); font-size: 12px; }
  .footer a { color: var(--text-light); }

  @media (max-width: 600px) {
    .dimension-topics { grid-template-columns: 1fr 1fr; }
    .header h1 { font-size: 15px; }
    .topic-detail-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1 id="app-title">Navigator Digitaler Wandel</h1>
  <div class="header-controls">
    <button class="back-btn" id="back-btn" onclick="goBack()">&#8592;</button>
    <button class="lang-btn active" onclick="setLang('de')">DE</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="mode-btn" id="pulse-toggle" onclick="startPulse()">Quick Pulse</button>
    <button class="mode-btn" id="barrier-toggle" onclick="showBarriers()" style="background:#7f8c8d">Barriers</button>
  </div>
</div>

<div class="container">
  <!-- COMPASS VIEW -->
  <div id="compass-view">
    <div class="compass-intro">
      <h2 id="compass-title">Kompass erkunden</h2>
      <p id="compass-desc">Wähle ein Thema, das dich interessiert. Es gibt keine richtige Reihenfolge — folge deiner Neugier.</p>
    </div>
    <div class="dimensions-grid" id="dimensions-grid"></div>
  </div>

  <!-- QUICK PULSE VIEW -->
  <div id="pulse-view">
    <div class="pulse-card" id="pulse-card"></div>
  </div>

  <!-- TOPIC DETAIL VIEW -->
  <div id="topic-view">
    <div class="topic-detail" id="topic-detail"></div>
  </div>

  <!-- BARRIER LENS VIEW -->
  <div id="barrier-view">
    <div class="barrier-section" id="barrier-section"></div>
  </div>
</div>

<div class="footer">
  <p>Navigator Digitaler Wandel &mdash; basierend auf dem <a href="https://kompassdigitalerwandel.ch/" target="_blank">Kompass Digitaler Wandel</a> der PHZH</p>
  <p style="margin-top:4px">Zentrum Medienbildung und Informatik &mdash; CC BY-SA</p>
</div>

<div id="debug-log" style="display:none;position:fixed;bottom:0;left:0;right:0;max-height:200px;overflow:auto;background:#fee;border-top:2px solid red;padding:8px 12px;font-family:monospace;font-size:12px;z-index:9999"></div>

<script>
// ============================================================
// DEBUG — visible error reporting
// ============================================================
function debugLog(msg) {
  console.error(msg);
  var el = document.getElementById('debug-log');
  el.style.display = 'block';
  el.innerHTML += '<div>' + String(msg).replace(/</g,'&lt;') + '</div>';
}
window.onerror = function(msg, src, line, col, err) {
  debugLog('ERROR [' + line + ':' + col + ']: ' + msg + (err ? '\n' + err.stack : ''));
};
window.addEventListener('unhandledrejection', function(e) {
  debugLog('PROMISE ERROR: ' + e.reason);
});

// ============================================================
// DATA — loaded inline for prototype, would be fetched in prod
// ============================================================
let DATA = null;
let LANG = 'de';
let visitedTopics = new Set();
let pulseStep = 0;
let pulseNotes = {};
let viewStack = ['compass'];

const UI = {
  de: {
    title: 'Navigator Digitaler Wandel',
    compassTitle: 'Kompass erkunden',
    compassDesc: 'Wähle ein Thema, das dich interessiert. Es gibt keine richtige Reihenfolge — folge deiner Neugier.',
    quickPulse: 'Quick Pulse',
    barriers: 'Hindernisse',
    back: '\u2190 Zurück',
    connected: 'Verwandte Themen — wohin möchtest du als nächstes?',
    notes: 'Deine Gedanken (optional)...',
    skip: 'Überspringen',
    next: 'Weiter',
    finish: 'Auswerten',
    pulseResult: 'Dein Startpunkt',
    pulseResultDesc: 'Basierend auf deinen Antworten könnte dieses Thema ein guter Ausgangspunkt für vertieftes Nachdenken sein:',
    pulseStart: 'Hier starten',
    barrierTitle: 'Was bremst euch?',
    barrierDesc: 'Statt den Kompass linear durchzugehen, erkunde die Hindernisse. Auf welcher Ebene vermutest du die grössten Bremsen?',
    barrierTeacher: 'Ebene Lehrperson',
    barrierTeacherDesc: 'Kompetenzen, Haltungen, Unsicherheit, Zeitmangel',
    barrierSchool: 'Ebene Schule',
    barrierSchoolDesc: 'Fehlende Vision, schwache Führung, keine Strukturen, wenig Kooperation',
    barrierSystem: 'Ebene System',
    barrierSystemDesc: 'Infrastruktur, Finanzierung, rechtlicher Rahmen, externer Support',
    newQuestion: 'NEU',
    visited: 'besucht',
    questionCount: 'Fragen',
  },
  en: {
    title: 'Navigator Digital Transformation',
    compassTitle: 'Explore the Compass',
    compassDesc: 'Choose a topic that interests you. There is no right order — follow your curiosity.',
    quickPulse: 'Quick Pulse',
    barriers: 'Barriers',
    back: '\u2190 Back',
    connected: 'Connected topics — where would you like to go next?',
    notes: 'Your thoughts (optional)...',
    skip: 'Skip',
    next: 'Next',
    finish: 'See result',
    pulseResult: 'Your Starting Point',
    pulseResultDesc: 'Based on your responses, this topic might be a good starting point for deeper reflection:',
    pulseStart: 'Start here',
    barrierTitle: 'What\u2019s holding you back?',
    barrierDesc: 'Instead of walking through the compass linearly, explore the barriers. At which level do you suspect the biggest obstacles?',
    barrierTeacher: 'Teacher Level',
    barrierTeacherDesc: 'Skills, mindsets, insecurity, lack of time',
    barrierSchool: 'School Level',
    barrierSchoolDesc: 'Missing vision, weak leadership, no structures, limited cooperation',
    barrierSystem: 'System Level',
    barrierSystemDesc: 'Infrastructure, funding, legal framework, external support',
    newQuestion: 'NEW',
    visited: 'visited',
    questionCount: 'questions',
  }
};

const DIMENSION_COLORS = {
  'people-skills': '#E6007E',
  'teaching-learning': '#E30613',
  'organisation-structures': '#95C11F',
  'cooperation-team': '#F5A623',
  'infrastructure': '#00B4D5'
};

// ============================================================
// INIT
// ============================================================
async function init() {
  try {
    var resp = await fetch('../data/navigator.json');
    if (resp.ok) {
      DATA = await resp.json();
      debugLog('Data loaded via fetch: ' + DATA.topics.length + ' topics');
      renderCompass();
      return;
    }
  } catch(e) {
    debugLog('Fetch failed (likely file:// CORS), trying script injection...');
  }
  try {
    var script = document.createElement('script');
    script.src = '../data/navigator.js';
    script.onload = function() {
      DATA = window.__NAVIGATOR_DATA__;
      if (DATA) {
        debugLog('Data loaded via script: ' + DATA.topics.length + ' topics');
        renderCompass();
      } else {
        debugLog('Script loaded but __NAVIGATOR_DATA__ is undefined');
      }
    };
    script.onerror = function() {
      debugLog('Script loading failed');
      document.getElementById('compass-view').innerHTML = '<div style="text-align:center;padding:60px 20px">'
        + '<h2>Daten konnten nicht geladen werden</h2>'
        + '<p style="color:#7f8c8d;margin-top:12px">Bitte starte einen lokalen Server:</p>'
        + '<pre style="background:#f0f0f0;padding:16px;border-radius:8px;margin-top:12px;display:inline-block;text-align:left">cd DigitalerWandel\npython3 -m http.server 8000</pre>'
        + '<p style="color:#7f8c8d;margin-top:12px">Dann öffne: <a href="http://localhost:8000/prototype/">http://localhost:8000/prototype/</a></p>'
        + '</div>';
    };
    document.head.appendChild(script);
  } catch(e2) {
    debugLog('All loading methods failed: ' + e2.message);
  }
}

function t(key) { return UI[LANG][key] || key; }
function dimName(dimId) {
  var dim = DATA.dimensions.find(function(d) { return d.id === dimId; });
  return dim ? dim.i18n[LANG].name : dimId;
}
function topicName(topicId) {
  var topic = DATA.topics.find(function(tp) { return tp.id === topicId; });
  return topic ? topic.i18n[LANG].name : topicId;
}

// ============================================================
// LANGUAGE
// ============================================================
function setLang(lang) {
  LANG = lang;
  var btns = document.querySelectorAll('.lang-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].textContent.trim() === lang.toUpperCase());
  }
  document.getElementById('app-title').textContent = t('title');
  document.getElementById('pulse-toggle').textContent = t('quickPulse');
  document.getElementById('barrier-toggle').textContent = t('barriers');
  var current = viewStack[viewStack.length - 1];
  if (current === 'compass') renderCompass();
  else if (current === 'pulse') renderPulseStep();
  else if (current === 'barriers') renderBarriers();
  else if (current.startsWith('topic:')) openTopic(current.split(':')[1], false);
}

// ============================================================
// NAVIGATION
// ============================================================
function showView(id) {
  var views = ['compass-view', 'pulse-view', 'topic-view', 'barrier-view'];
  for (var i = 0; i < views.length; i++) {
    document.getElementById(views[i]).style.display = 'none';
  }
  document.getElementById(id).style.display = 'block';
  document.getElementById('back-btn').style.display = viewStack.length > 1 ? 'inline-block' : 'none';
}

function goBack() {
  if (viewStack.length <= 1) return;
  viewStack.pop();
  var prev = viewStack[viewStack.length - 1];
  if (prev === 'compass') { showView('compass-view'); renderCompass(); }
  else if (prev === 'pulse') { showView('pulse-view'); }
  else if (prev === 'barriers') { showView('barrier-view'); renderBarriers(); }
  else if (prev.startsWith('topic:')) { showView('topic-view'); openTopic(prev.split(':')[1], false); }
}

// ============================================================
// COMPASS VIEW
// ============================================================
function renderCompass() {
  try {
    showView('compass-view');
    document.getElementById('compass-title').textContent = t('compassTitle');
    document.getElementById('compass-desc').textContent = t('compassDesc');

    var grid = document.getElementById('dimensions-grid');
    grid.innerHTML = '';

    var dimOrder = ['people-skills', 'teaching-learning', 'organisation-structures', 'cooperation-team', 'infrastructure'];

    for (var di = 0; di < dimOrder.length; di++) {
      var dimId = dimOrder[di];
      var dim = DATA.dimensions.find(function(d) { return d.id === dimId; });
      var topics = DATA.topics.filter(function(tp) { return tp.dimension === dimId; });

      var section = document.createElement('div');
      section.className = 'dimension-section';
      section.innerHTML = '<div class="dimension-header">'
        + '<div class="dimension-dot" style="background:' + dim.color + '"></div>'
        + '<span class="dimension-name">' + dim.i18n[LANG].name + '</span>'
        + '</div>'
        + '<div class="dimension-topics"></div>';
      grid.appendChild(section);

      var topicsDiv = section.querySelector('.dimension-topics');
      for (var ti = 0; ti < topics.length; ti++) {
        var topic = topics[ti];
        var card = document.createElement('div');
        card.className = 'topic-card' + (visitedTopics.has(topic.id) ? ' visited' : '');
        card.style.borderLeftColor = dim.color;
        card.style.borderLeftWidth = '3px';
        card.style.borderLeftStyle = 'solid';
        var newCount = topic.questions.filter(function(q) { return q.source === 'research-addition'; }).length;
        card.innerHTML = '<div class="topic-number">' + topic.number + ' &middot; ' + topic.questions.length + ' ' + t('questionCount') + '</div>'
          + '<div class="topic-name">' + topic.i18n[LANG].name + '</div>'
          + (newCount > 0 ? '<span class="topic-badge">+' + newCount + ' ' + t('newQuestion') + '</span>' : '');
        card.onclick = (function(tid) { return function() { openTopic(tid, true); }; })(topic.id);
        topicsDiv.appendChild(card);
      }
    }
  } catch(err) {
    debugLog('renderCompass error: ' + err.message + '\n' + err.stack);
  }
}

// ============================================================
// TOPIC DETAIL VIEW — uses DOM methods for robustness
// ============================================================
function openTopic(topicId, pushHistory) {
  var detail = document.getElementById('topic-detail');
  try {
    var topic = DATA.topics.find(function(tp) { return tp.id === topicId; });
    if (!topic) { detail.innerHTML = '<p style="color:red">Topic not found: ' + topicId + '</p>'; return; }
    visitedTopics.add(topicId);
    if (pushHistory) viewStack.push('topic:' + topicId);
    showView('topic-view');

    var dim = DATA.dimensions.find(function(d) { return d.id === topic.dimension; });
    if (!dim) { detail.innerHTML = '<p style="color:red">Dimension not found: ' + topic.dimension + '</p>'; return; }

    // Build using DOM methods — avoids all template literal / innerHTML parsing issues
    var frag = document.createDocumentFragment();

    // Header
    var header = document.createElement('div');
    header.className = 'topic-detail-header';
    var dot = document.createElement('div');
    dot.className = 'dimension-dot';
    dot.style.background = dim.color;
    header.appendChild(dot);
    var dimLabel = document.createElement('span');
    dimLabel.className = 'topic-detail-dim';
    dimLabel.style.color = dim.color;
    dimLabel.textContent = dim.i18n[LANG].name;
    header.appendChild(dimLabel);
    frag.appendChild(header);

    // Title
    var title = document.createElement('div');
    title.className = 'topic-detail-title';
    title.textContent = topic.number + '. ' + topic.i18n[LANG].name;
    frag.appendChild(title);

    // Question list
    var qlist = document.createElement('div');
    qlist.className = 'question-list';

    for (var qi = 0; qi < topic.questions.length; qi++) {
      var q = topic.questions[qi];
      var isNew = q.source === 'research-addition';
      var qText = '—';
      if (q.i18n) { qText = q.i18n[LANG] || q.i18n['de'] || '—'; }
      var qTags = (q.tags || []).slice(0, 3);

      var item = document.createElement('div');
      item.className = 'question-item';

      var textDiv = document.createElement('div');
      textDiv.className = 'question-text';
      textDiv.textContent = qText;
      item.appendChild(textDiv);

      var meta = document.createElement('div');
      meta.className = 'question-meta';
      if (isNew) {
        var newTag = document.createElement('span');
        newTag.className = 'question-tag new';
        newTag.textContent = t('newQuestion');
        meta.appendChild(newTag);
      }
      for (var ti = 0; ti < qTags.length; ti++) {
        var tagSpan = document.createElement('span');
        tagSpan.className = 'question-tag';
        tagSpan.textContent = qTags[ti];
        meta.appendChild(tagSpan);
      }
      item.appendChild(meta);

      var textarea = document.createElement('textarea');
      textarea.className = 'question-textarea';
      textarea.placeholder = t('notes');
      item.appendChild(textarea);

      qlist.appendChild(item);
    }
    frag.appendChild(qlist);

    // Connected topics
    if (topic.links && topic.links.length > 0) {
      var connDiv = document.createElement('div');
      connDiv.className = 'connections';
      var connTitle = document.createElement('h3');
      connTitle.textContent = t('connected');
      connDiv.appendChild(connTitle);

      var chips = document.createElement('div');
      chips.className = 'connection-chips';
      for (var li = 0; li < topic.links.length; li++) {
        var linkId = topic.links[li];
        var linked = DATA.topics.find(function(tp) { return tp.id === linkId; });
        if (!linked) continue;
        var linkDim = DATA.dimensions.find(function(d) { return d.id === linked.dimension; });
        if (!linkDim) continue;
        var chip = document.createElement('button');
        chip.className = 'connection-chip';
        chip.style.background = linkDim.color;
        chip.textContent = linked.number + '. ' + linked.i18n[LANG].name + (visitedTopics.has(linkId) ? ' \u2713' : '');
        chip.setAttribute('data-topic', linkId);
        chip.onclick = (function(tid) { return function() { openTopic(tid, true); }; })(linkId);
        chips.appendChild(chip);
      }
      connDiv.appendChild(chips);
      frag.appendChild(connDiv);
    }

    detail.innerHTML = '';
    detail.appendChild(frag);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch(err) {
    console.error('openTopic error:', err);
    detail.innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap">' + err.message + '\n' + err.stack + '</pre>';
  }
}

// ============================================================
// QUICK PULSE
// ============================================================
function startPulse() {
  pulseStep = 0;
  pulseNotes = {};
  viewStack = ['compass', 'pulse'];
  showView('pulse-view');
  renderPulseStep();
}

function getPulseQuestions() {
  var result = [];
  for (var i = 0; i < DATA.topics.length; i++) {
    var topic = DATA.topics[i];
    for (var j = 0; j < topic.questions.length; j++) {
      var q = topic.questions[j];
      if (q.quickPulse) {
        var merged = {};
        for (var k in q) { if (q.hasOwnProperty(k)) merged[k] = q[k]; }
        merged.topicId = topic.id;
        merged.dimension = topic.dimension;
        result.push(merged);
      }
    }
  }
  return result;
}

function renderPulseStep() {
  try {
    const questions = getPulseQuestions();
    const card = document.getElementById('pulse-card');

    if (pulseStep >= questions.length) {
      renderPulseResult();
      return;
    }

    var q = questions[pulseStep];
    var dim = DATA.dimensions.find(function(d) { return d.id === q.dimension; });

    var dots = '';
    for (var i = 0; i < questions.length; i++) {
      var cls = i < pulseStep ? 'done' : i === pulseStep ? 'active' : '';
      dots += '<div class="pulse-dot ' + cls + '" style="' + (cls === 'done' ? 'background:' + DIMENSION_COLORS[questions[i].dimension] : cls === 'active' ? 'background:' + dim.color : '') + '"></div>';
    }

    var qText = q.i18n[LANG] || q.i18n['de'] || '';
    card.innerHTML = '<div class="pulse-progress">' + dots + '</div>'
      + '<div class="pulse-dimension" style="color:' + dim.color + '">' + dim.i18n[LANG].name + '</div>'
      + '<div class="pulse-question">' + qText + '</div>'
      + '<textarea class="pulse-textarea" id="pulse-input" placeholder="' + t('notes') + '">' + (pulseNotes[pulseStep] || '') + '</textarea>'
      + '<div class="pulse-nav">'
      + '<button class="pulse-skip" onclick="pulseNav(\'skip\')">' + t('skip') + '</button>'
      + '<button class="pulse-next" style="background:' + dim.color + '" onclick="pulseNav(\'next\')">'
      + (pulseStep === questions.length - 1 ? t('finish') : t('next')) + ' &rarr;</button>'
      + '</div>';
  } catch(err) {
    debugLog('renderPulseStep error: ' + err.message + '\n' + err.stack);
    document.getElementById('pulse-card').innerHTML = '<p style="color:red;padding:20px">Pulse error: ' + err.message + '</p>';
  }
}

function pulseNav(action) {
  const input = document.getElementById('pulse-input');
  if (input) pulseNotes[pulseStep] = input.value;
  pulseStep++;
  renderPulseStep();
}

function renderPulseResult() {
  try {
    var questions = getPulseQuestions();
    var suggestDim = null;
    var minLen = Infinity;
    questions.forEach(function(q, i) {
      var len = (pulseNotes[i] || '').trim().length;
      if (len < minLen) { minLen = len; suggestDim = q.dimension; }
    });

    var dimTopics = DATA.topics.filter(function(tp) { return tp.dimension === suggestDim; });
    dimTopics.sort(function(a, b) { return (b.links ? b.links.length : 0) - (a.links ? a.links.length : 0); });
    var suggested = dimTopics[0];
    var dim = DATA.dimensions.find(function(d) { return d.id === suggestDim; });

    var card = document.getElementById('pulse-card');
    card.innerHTML = '<div class="pulse-result">'
      + '<h3>' + t('pulseResult') + '</h3>'
      + '<p>' + t('pulseResultDesc') + '</p>'
      + '<button class="pulse-suggestion" style="background:' + dim.color + '" onclick="openTopic(\'' + suggested.id + '\', true)">'
      + suggested.number + '. ' + suggested.i18n[LANG].name + '<br>'
      + '<small style="opacity:0.8">' + t('pulseStart') + ' &rarr;</small>'
      + '</button></div>';
  } catch(err) {
    debugLog('renderPulseResult error: ' + err.message + '\n' + err.stack);
  }
}

// ============================================================
// BARRIER LENS
// ============================================================
function showBarriers() {
  viewStack = ['compass', 'barriers'];
  showView('barrier-view');
  renderBarriers();
}

function renderBarriers() {
  try {
    var section = document.getElementById('barrier-section');
    var mapping = DATA.barrierMapping;

    var levels = [
      { key: 'teacher-level', title: t('barrierTeacher'), desc: t('barrierTeacherDesc'), color: '#E6007E' },
      { key: 'school-level', title: t('barrierSchool'), desc: t('barrierSchoolDesc'), color: '#95C11F' },
      { key: 'system-level', title: t('barrierSystem'), desc: t('barrierSystemDesc'), color: '#00B4D5' },
    ];

    var html = '<div class="barrier-intro">'
      + '<h2>' + t('barrierTitle') + '</h2>'
      + '<p style="color:var(--text-light);margin-top:8px">' + t('barrierDesc') + '</p>'
      + '</div>';

    for (var li = 0; li < levels.length; li++) {
      var level = levels[li];
      var topicIds = mapping[level.key] || [];
      var chips = '';
      for (var ti = 0; ti < topicIds.length; ti++) {
        var tid = topicIds[ti];
        var topic = DATA.topics.find(function(tp) { return tp.id === tid; });
        if (!topic) continue;
        chips += '<button class="barrier-topic-chip" onclick="openTopic(\'' + tid + '\', true)">' + topic.number + '. ' + topic.i18n[LANG].name + '</button>';
      }
      html += '<div class="barrier-level" style="border-left: 4px solid ' + level.color + '">'
        + '<h3>' + level.title + '</h3>'
        + '<p>' + level.desc + '</p>'
        + '<div class="barrier-topics">' + chips + '</div>'
        + '</div>';
    }

    section.innerHTML = html;
  } catch(err) {
    debugLog('renderBarriers error: ' + err.message + '\n' + err.stack);
    document.getElementById('barrier-section').innerHTML = '<p style="color:red;padding:20px">Barrier error: ' + err.message + '</p>';
  }
}

// ============================================================
// START
// ============================================================
init();
</script>
